name: Release

on:
  workflow_call:
    inputs:
      archive-prefix:
        description: 'Prefix for release archive files (e.g., contexts)'
        required: true
        type: string
      package-name:
        description: 'Composer package name (e.g., netresearch/contexts)'
        required: true
        type: string
      include-sbom:
        description: 'Include SPDX and CycloneDX SBOMs'
        required: false
        type: boolean
        default: true
      sign-artifacts:
        description: 'Sign artifacts with Cosign keyless signing'
        required: false
        type: boolean
        default: true

# CALLER REQUIREMENTS
# ===================
# When calling this reusable workflow, the caller's job-level
# `permissions:` block MUST grant at least this full set, otherwise
# the run fails with `startup_failure` before any job executes
# (GitHub rejects the workflow at startup when the reusable declares
# a permission the caller did not grant). NOTE: setting ANY scope in a
# `permissions:` block forces every UNLISTED scope to `none`, and a job
# that omits `permissions:` inherits the repository default
# (default_workflow_permissions) — so a repo hardened to `read` will
# startup-fail here unless these scopes are granted explicitly.
#
#   jobs:
#     release:
#       uses: netresearch/typo3-ci-workflows/.github/workflows/release.yml@main
#       permissions:
#         attestations: write
#         contents: write
#         id-token: write
permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate inputs
        env:
          ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$ARCHIVE_PREFIX" == *..* ]] || [[ "$ARCHIVE_PREFIX" == /* ]]; then
            echo "::error::Invalid archive-prefix: must not contain '..' or start with '/'"
            exit 1
          fi
          if [[ "$VERSION" == *..* ]] || [[ "$VERSION" == */* ]]; then
            echo "::error::Invalid version string derived from tag"
            exit 1
          fi

      - name: Generate Release Notes
        id: notes
        run: |
          DELIMITER="ghadelim_$(openssl rand -hex 8)"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            {
              echo "notes<<$DELIMITER"
              echo "Initial release"
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<$DELIMITER"
              git log --pretty=format:"- %s" "${PREVIOUS_TAG}..HEAD"
              echo ""
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release archive
        env:
          ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          git archive --format=zip --prefix="${ARCHIVE_PREFIX}/" HEAD -o "dist/${ARCHIVE_PREFIX}-${VERSION}.zip"
          git archive --format=tar.gz --prefix="${ARCHIVE_PREFIX}/" HEAD -o "dist/${ARCHIVE_PREFIX}-${VERSION}.tar.gz"

      - name: Generate SBOM (SPDX)
        if: inputs.include-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.sbom.spdx.json

      - name: Generate SBOM (CycloneDX)
        if: inputs.include-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.sbom.cdx.json

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > checksums.txt
          cat checksums.txt

      - name: Install Cosign
        if: inputs.sign-artifacts
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifacts with Cosign (keyless)
        if: inputs.sign-artifacts
        run: |
          cd dist
          for file in *; do
            [ -f "$file" ] || continue
            case "$file" in
              *.sigstore.json) continue ;;  # don't sign already-generated signature bundles
            esac
            # Use .sigstore.json (Sigstore bundle format) so OSSF Scorecard
            # recognizes the artifact as signed. The bytes are identical to
            # cosign's --bundle output; only the extension differs.
            cosign sign-blob --yes "$file" --bundle "${file}.sigstore.json"
          done

      - name: Generate attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.zip
            dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*
          body: |
            ## Changes
            ${{ steps.notes.outputs.notes }}

            ## Installation

            ```bash
            composer require ${{ inputs.package-name }}
            ```

            ## Security

            All release artifacts are signed with [Sigstore](https://www.sigstore.dev/) keyless signing.

            ### Verify signatures

            ```bash
            cosign verify-blob \
              --bundle ${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.zip.sigstore.json \
              --certificate-identity-regexp "https://github.com/${{ github.repository_owner }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.zip
            ```

            ### Verify checksums

            ```bash
            sha256sum -c checksums.txt
            ```

            ## Software Bill of Materials (SBOM)

            SBOMs are provided in both SPDX and CycloneDX formats for supply chain transparency.
