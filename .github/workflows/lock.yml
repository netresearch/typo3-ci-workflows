# Moved to netresearch/.github — this wrapper provides backward compatibility.
# New repos should use: netresearch/.github/.github/workflows/lock.yml@main
name: Lock Threads

on:
  workflow_call:
    inputs:
      issue-inactive-days:
        description: 'Days before locking inactive issues'
        required: false
        type: number
        default: 365
      pr-inactive-days:
        description: 'Days before locking inactive PRs'
        required: false
        type: number
        default: 365
      issue-lock-reason:
        description: 'Reason for locking issues'
        required: false
        type: string
        default: 'resolved'
      pr-lock-reason:
        description: 'Reason for locking PRs'
        required: false
        type: string
        default: 'resolved'
      log-output:
        description: 'Log processed threads'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  lock:
    uses: netresearch/.github/.github/workflows/lock.yml@ac02398d6b2413d9677ec97763b4c8173b605695 # main
    with:
      issue-inactive-days: ${{ inputs.issue-inactive-days }}
      pr-inactive-days: ${{ inputs.pr-inactive-days }}
      issue-lock-reason: ${{ inputs.issue-lock-reason }}
      pr-lock-reason: ${{ inputs.pr-lock-reason }}
      log-output: ${{ inputs.log-output }}
    permissions:
      issues: write
      pull-requests: write
    secrets: inherit
