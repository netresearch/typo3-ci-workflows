name: CI

on:
  workflow_call:
    inputs:
      # PHP / TYPO3 matrix
      php-versions:
        description: JSON array of PHP versions
        type: string
        default: '["8.4"]'
      typo3-versions:
        description: JSON array of TYPO3 versions (e.g. '["^12.4", "^13.4"]')
        type: string
        default: '["^13.4"]'
      matrix-exclude:
        description: JSON array of {php, typo3} combinations to exclude
        type: string
        default: '[]'

      # Feature flags
      run-lint:
        description: Run PHP syntax lint
        type: boolean
        default: true
      run-cgl:
        description: Run code style check (PHP-CS-Fixer)
        type: boolean
        default: true
      run-phpstan:
        description: Run PHPStan static analysis
        type: boolean
        default: true
      run-rector:
        description: Run Rector dry-run
        type: boolean
        default: true
      run-unit-tests:
        description: Run PHPUnit unit tests
        type: boolean
        default: true
      run-functional-tests:
        description: Run PHPUnit functional tests
        type: boolean
        default: false

      # Tool commands (empty = auto-detect from composer scripts)
      cgl-command:
        description: CGL command (default uses composer ci:test:php:cgl or ci:cgl -- --dry-run)
        type: string
        default: ''
      phpstan-command:
        description: PHPStan command (default uses composer ci:test:php:phpstan)
        type: string
        default: ''
      rector-command:
        description: Rector command (default uses composer ci:test:php:rector)
        type: string
        default: ''
      unit-test-command:
        description: Unit test command (default uses composer ci:test:php:unit)
        type: string
        default: ''
      functional-test-command:
        description: Functional test command (default uses composer ci:test:php:functional)
        type: string
        default: ''

      # TYPO3 packages to require for matrix testing
      typo3-packages:
        description: 'JSON array of TYPO3 packages (e.g. ["typo3/cms-core", "typo3/cms-backend"])'
        type: string
        default: '["typo3/cms-core"]'

      # PHP extensions
      php-extensions:
        description: PHP extensions to install
        type: string
        default: intl, mbstring, xml

      # Functional test database
      functional-test-db:
        description: Database for functional tests (sqlite, mysql, mariadb, postgres)
        type: string
        default: sqlite
      db-image:
        description: Docker image for database service
        type: string
        default: 'mysql:9.6'

      # Coverage
      upload-coverage:
        description: Upload coverage to Codecov
        type: boolean
        default: false
      coverage-tool:
        description: >-
          Coverage driver. "xdebug" (default) delivers branch + path
          coverage and matches the local `composer ci:test:php:*:coverage`
          scripts which set XDEBUG_MODE=coverage -- choosing xdebug here
          eliminates "green locally, red in CI" drift around
          beStrictAboutCoverageMetadata. "pcov" is line-only but ~3-10x
          faster; set it explicitly when CI runtime matters more than
          coverage fidelity.
        type: string
        default: xdebug

      # Incompatible dev deps
      remove-dev-deps:
        description: 'JSON array of dev deps to remove for TYPO3 version compat (e.g. [{"dep":"saschaegerer/phpstan-typo3","only-for":"^13"}])'
        type: string
        default: '[]'

    secrets:
      CODECOV_TOKEN:
        required: false

permissions: {}

jobs:
  preflight:
    # Skip post-merge `push` runs whose SHA was already validated by a
    # successful `merge_group` run on the SAME workflow. The logic is
    # inlined (rather than a composite action) because cross-repo
    # reusable workflows cannot reference a same-repo composite action
    # via `./` syntax, and pinning a self-reference to a SHA creates a
    # chicken-and-egg between workflow change and SHA bump.
    name: Preflight (event gate)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          # Non-push events: never the duplicate case — always run.
          if [ "$EVENT" != "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: event=$EVENT — running."
            exit 0
          fi

          # Push to a non-default branch: merge_group lands on the default
          # branch only, so a same-SHA push elsewhere is a separate context
          # that should still run CI.
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: push to non-default branch ($REF_NAME) — running."
            exit 0
          fi

          # Derive the calling workflow file name from github.workflow_ref
          # (format: <owner>/<repo>/<path>@<ref>).
          WORKFLOW_FILE="${WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE##*/}"
          if [ -z "$WORKFLOW_FILE" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::warning::preflight: could not derive workflow file from \$WORKFLOW_REF — running (fail open)."
            exit 0
          fi

          # Scope the lookup to *this* workflow file only — another workflow
          # succeeding on merge_group for the same SHA does not prove THIS
          # workflow already ran. Failure to query (missing actions:read,
          # transient error) → fail open ("run=true").
          list_url="repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/runs?head_sha=${SHA}&event=merge_group&per_page=100"
          runs_json=$(gh api "$list_url" 2>/dev/null || echo '{"workflow_runs":[]}')

          matched=$(echo "$runs_json" \
            | jq '[.workflow_runs[] | select(.conclusion == "success")] | length' 2>/dev/null \
            || echo 0)
          [[ "$matched" =~ ^[0-9]+$ ]] || matched=0

          if [ "$matched" -gt 0 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: skipping push run — workflow $WORKFLOW_FILE has $matched merge_group run(s) on SHA $SHA already validating this tree."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: running — no qualifying merge_group run for workflow $WORKFLOW_FILE on SHA $SHA."
          fi

  lint:
    needs: preflight
    name: Lint
    if: ${{ inputs.run-lint && needs.preflight.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(inputs.php-versions) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: PHP syntax check
        run: |
          FILE_COUNT=$(find . -name '*.php' -not -path './.Build/*' -not -path './vendor/*' | wc -l)
          echo "Linting $FILE_COUNT PHP files..."
          if [[ "$FILE_COUNT" -eq 0 ]]; then
            echo "::warning::No PHP files found to lint"
          else
            find . -name '*.php' -not -path './.Build/*' -not -path './vendor/*' -print0 | xargs -0 -P"$(nproc)" -n1 php -l
          fi

      - name: Check ext_emconf.php for strict_types
        if: ${{ matrix.php == fromJSON(inputs.php-versions)[0] }}
        run: |
          if [[ -f ext_emconf.php ]]; then
            if grep -Eq '^[[:space:]]*declare[[:space:]]*\([[:space:]]*strict_types[[:space:]]*=[[:space:]]*1[[:space:]]*\)[[:space:]]*;?' ext_emconf.php; then
              echo "::error file=ext_emconf.php::ext_emconf.php must NOT contain declare(strict_types=1) — TER cannot parse it with strict_types enabled. Remove the declaration from this file."
              exit 1
            else
              echo "ext_emconf.php: OK (no strict_types declaration)"
            fi
          else
            echo "No ext_emconf.php found — skipping check"
          fi

      - name: Check .gitattributes for export-ignore
        if: ${{ matrix.php == fromJSON(inputs.php-versions)[0] }}
        run: |
          if [[ ! -f .gitattributes ]]; then
            echo "::warning::.gitattributes file is missing. For TER publishing, add .gitattributes with export-ignore rules to exclude dev files (tests, CI configs) from the release archive."
          elif ! grep -Ev '^[[:space:]]*#|^[[:space:]]*$' .gitattributes | grep -q 'export-ignore'; then
            echo "::warning::.gitattributes exists but contains no export-ignore rules. Add export-ignore entries for dev files (tests, CI configs) to keep TER release archives clean."
          else
            echo ".gitattributes: OK (has export-ignore rules)"
          fi

  # CGL runs on first PHP version only - code style results are PHP-version-independent
  cgl:
    needs: preflight
    name: Code Style
    if: ${{ inputs.run-cgl && needs.preflight.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ fromJSON(inputs.php-versions)[0] }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-cgl-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-cgl-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run code style check
        env:
          CGL_COMMAND: ${{ inputs.cgl-command }}
        run: |
          SCRIPTS=$(composer run-script --list 2>/dev/null || true)
          if [[ -n "$CGL_COMMAND" ]]; then
            bash -euo pipefail -c "$CGL_COMMAND"
          elif echo "$SCRIPTS" | grep -q 'ci:test:php:cgl'; then
            composer ci:test:php:cgl
          elif echo "$SCRIPTS" | grep -q 'ci:cgl'; then
            composer ci:cgl -- --dry-run
          elif echo "$SCRIPTS" | grep -q 'ci:lint:php'; then
            composer ci:lint:php
          elif echo "$SCRIPTS" | grep -q 'check:php:cs-fixer'; then
            composer check:php:cs-fixer
          elif echo "$SCRIPTS" | grep -q 'code:style:check'; then
            composer code:style:check
          else
            echo "::notice::No CGL script found. Skipping. Add ci:test:php:cgl to composer scripts or provide cgl-command input."
          fi

  phpstan:
    needs: preflight
    name: PHPStan
    if: ${{ inputs.run-phpstan && needs.preflight.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(inputs.php-versions) }}
        typo3: ${{ fromJSON(inputs.typo3-versions) }}
        exclude: ${{ fromJSON(inputs.matrix-exclude) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.typo3 }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.typo3 }}-
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Remove incompatible dev deps
        env:
          REMOVE_DEV_DEPS: ${{ inputs.remove-dev-deps }}
          TYPO3_VERSION: ${{ matrix.typo3 }}
        run: |
          if [[ "$REMOVE_DEV_DEPS" == "[]" ]]; then exit 0; fi
          echo "$REMOVE_DEV_DEPS" | python3 -c "
          import json, os, sys, subprocess
          try:
              entries = json.load(sys.stdin)
          except json.JSONDecodeError as e:
              print(f'::error::Invalid JSON in remove-dev-deps input: {e}')
              sys.exit(1)
          typo3 = os.environ['TYPO3_VERSION']
          for entry in entries:
              dep = entry.get('dep')
              if not dep:
                  print(f'::error::remove-dev-deps entry missing dep key: {entry}')
                  sys.exit(1)
              only_for = entry.get('only-for', '')
              if only_for:
                  patterns = [p.strip() for p in only_for.split('|')]
                  if not any(typo3.startswith(p) for p in patterns):
                      print(f'Removing {dep} (only compatible with {only_for})')
                      subprocess.run(['composer', 'remove', '--dev', '--no-update', dep], check=True)
              else:
                  print(f'::warning::remove-dev-deps entry for {dep} has no only-for filter, skipping')
          "

      - name: Install TYPO3
        env:
          TYPO3_VERSION: ${{ matrix.typo3 }}
          TYPO3_PACKAGES: ${{ inputs.typo3-packages }}
        run: |
          PACKAGES=$(echo "$TYPO3_PACKAGES" | jq -r '.[]') || {
            echo "::error::Failed to parse typo3-packages input: $TYPO3_PACKAGES"
            exit 1
          }
          for pkg in $PACKAGES; do
            composer require --no-update "$pkg:${TYPO3_VERSION}"
          done
          composer install --prefer-dist --no-progress

      - name: Run PHPStan
        env:
          PHPSTAN_COMMAND: ${{ inputs.phpstan-command }}
        run: |
          SCRIPTS=$(composer run-script --list 2>/dev/null || true)
          if [[ -n "$PHPSTAN_COMMAND" ]]; then
            bash -euo pipefail -c "$PHPSTAN_COMMAND"
          elif echo "$SCRIPTS" | grep -q 'ci:test:php:phpstan'; then
            composer ci:test:php:phpstan -- --error-format=github
          elif echo "$SCRIPTS" | grep -q 'ci:phpstan'; then
            composer ci:phpstan -- --error-format=github
          elif echo "$SCRIPTS" | grep -q 'ci:stan'; then
            composer ci:stan
          elif echo "$SCRIPTS" | grep -q 'check:php:stan'; then
            composer check:php:stan
          elif echo "$SCRIPTS" | grep -q 'code:phpstan'; then
            composer code:phpstan
          else
            echo "::notice::No PHPStan script found. Skipping. Add ci:test:php:phpstan to composer scripts or provide phpstan-command input."
          fi

  # Rector runs on first PHP version only - rule application is PHP-version-independent
  rector:
    needs: preflight
    name: Rector
    if: ${{ inputs.run-rector && needs.preflight.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ fromJSON(inputs.php-versions)[0] }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-rector-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-rector-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Rector
        env:
          RECTOR_COMMAND: ${{ inputs.rector-command }}
        run: |
          SCRIPTS=$(composer run-script --list 2>/dev/null || true)
          if [[ -n "$RECTOR_COMMAND" ]]; then
            bash -euo pipefail -c "$RECTOR_COMMAND"
          elif echo "$SCRIPTS" | grep -q 'ci:test:php:rector'; then
            composer ci:test:php:rector
          elif echo "$SCRIPTS" | grep -q 'check:php:rector'; then
            composer check:php:rector
          else
            echo "::notice::No Rector script found. Skipping. Add ci:test:php:rector to composer scripts or provide rector-command input."
          fi

  unit-tests:
    needs: preflight
    name: Unit Tests
    if: ${{ inputs.run-unit-tests && needs.preflight.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(inputs.php-versions) }}
        typo3: ${{ fromJSON(inputs.typo3-versions) }}
        exclude: ${{ fromJSON(inputs.matrix-exclude) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2
          coverage: ${{ inputs.upload-coverage && inputs.coverage-tool || 'none' }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.typo3 }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.typo3 }}-
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Remove incompatible dev deps
        env:
          REMOVE_DEV_DEPS: ${{ inputs.remove-dev-deps }}
          TYPO3_VERSION: ${{ matrix.typo3 }}
        run: |
          if [[ "$REMOVE_DEV_DEPS" == "[]" ]]; then exit 0; fi
          echo "$REMOVE_DEV_DEPS" | python3 -c "
          import json, os, sys, subprocess
          try:
              entries = json.load(sys.stdin)
          except json.JSONDecodeError as e:
              print(f'::error::Invalid JSON in remove-dev-deps input: {e}')
              sys.exit(1)
          typo3 = os.environ['TYPO3_VERSION']
          for entry in entries:
              dep = entry.get('dep')
              if not dep:
                  print(f'::error::remove-dev-deps entry missing dep key: {entry}')
                  sys.exit(1)
              only_for = entry.get('only-for', '')
              if only_for:
                  patterns = [p.strip() for p in only_for.split('|')]
                  if not any(typo3.startswith(p) for p in patterns):
                      print(f'Removing {dep} (only compatible with {only_for})')
                      subprocess.run(['composer', 'remove', '--dev', '--no-update', dep], check=True)
              else:
                  print(f'::warning::remove-dev-deps entry for {dep} has no only-for filter, skipping')
          "

      - name: Install TYPO3
        env:
          TYPO3_VERSION: ${{ matrix.typo3 }}
          TYPO3_PACKAGES: ${{ inputs.typo3-packages }}
        run: |
          PACKAGES=$(echo "$TYPO3_PACKAGES" | jq -r '.[]') || {
            echo "::error::Failed to parse typo3-packages input: $TYPO3_PACKAGES"
            exit 1
          }
          for pkg in $PACKAGES; do
            composer require --no-update "$pkg:${TYPO3_VERSION}"
          done
          composer install --prefer-dist --no-progress

      - name: Run unit tests
        env:
          UNIT_TEST_COMMAND: ${{ inputs.unit-test-command }}
          UPLOAD_COVERAGE: ${{ inputs.upload-coverage }}
        run: |
          SCRIPTS=$(composer run-script --list 2>/dev/null || true)
          if [[ -n "$UNIT_TEST_COMMAND" ]]; then
            bash -euo pipefail -c "$UNIT_TEST_COMMAND"
          elif echo "$SCRIPTS" | grep -q 'ci:test:php:unit'; then
            if [[ "$UPLOAD_COVERAGE" == "true" ]]; then
              composer ci:test:php:unit -- --coverage-clover=coverage-unit.xml
            else
              composer ci:test:php:unit -- --no-coverage
            fi
          elif echo "$SCRIPTS" | grep -q 'ci:tests:unit'; then
            composer ci:tests:unit
          elif echo "$SCRIPTS" | grep -q 'check:tests:unit'; then
            composer check:tests:unit
          elif echo "$SCRIPTS" | grep -q 'test:unit'; then
            composer test:unit
          else
            echo "::notice::No unit test script found. Skipping. Add ci:test:php:unit to composer scripts or provide unit-test-command input."
          fi

      - name: Upload coverage to Codecov
        if: ${{ inputs.upload-coverage }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-unit.xml
          flags: unit
          fail_ci_if_error: false

  functional-tests:
    needs: preflight
    name: Functional Tests
    if: ${{ inputs.run-functional-tests && inputs.functional-test-db != 'sqlite' && needs.preflight.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(inputs.php-versions) }}
        typo3: ${{ fromJSON(inputs.typo3-versions) }}
        exclude: ${{ fromJSON(inputs.matrix-exclude) }}
    services:
      db:
        image: ${{ inputs.db-image }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: typo3_test
          POSTGRES_PASSWORD: root
          POSTGRES_DB: typo3_test
        ports:
          - 3306:3306
          - 5432:5432
        options: >-
          --health-cmd="${{ inputs.functional-test-db == 'postgres' && 'pg_isready -U postgres' || 'mysqladmin ping --silent' }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ inputs.php-extensions }}, pdo_mysql, pdo_sqlite, pdo_pgsql
          tools: composer:v2
          coverage: ${{ inputs.upload-coverage && inputs.coverage-tool || 'none' }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-func-${{ matrix.php }}-${{ matrix.typo3 }}-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-func-${{ matrix.php }}-

      - name: Remove incompatible dev deps
        env:
          REMOVE_DEV_DEPS: ${{ inputs.remove-dev-deps }}
          TYPO3_VERSION: ${{ matrix.typo3 }}
        run: |
          if [[ "$REMOVE_DEV_DEPS" == "[]" ]]; then exit 0; fi
          echo "$REMOVE_DEV_DEPS" | python3 -c "
          import json, os, sys, subprocess
          try:
              entries = json.load(sys.stdin)
          except json.JSONDecodeError as e:
              print(f'::error::Invalid JSON in remove-dev-deps input: {e}')
              sys.exit(1)
          typo3 = os.environ['TYPO3_VERSION']
          for entry in entries:
              dep = entry.get('dep')
              if not dep:
                  print(f'::error::remove-dev-deps entry missing dep key: {entry}')
                  sys.exit(1)
              only_for = entry.get('only-for', '')
              if only_for:
                  patterns = [p.strip() for p in only_for.split('|')]
                  if not any(typo3.startswith(p) for p in patterns):
                      print(f'Removing {dep} (only compatible with {only_for})')
                      subprocess.run(['composer', 'remove', '--dev', '--no-update', dep], check=True)
              else:
                  print(f'::warning::remove-dev-deps entry for {dep} has no only-for filter, skipping')
          "

      - name: Install TYPO3
        env:
          TYPO3_VERSION: ${{ matrix.typo3 }}
          TYPO3_PACKAGES: ${{ inputs.typo3-packages }}
        run: |
          PACKAGES=$(echo "$TYPO3_PACKAGES" | jq -r '.[]') || {
            echo "::error::Failed to parse typo3-packages input: $TYPO3_PACKAGES"
            exit 1
          }
          for pkg in $PACKAGES; do
            composer require --no-update "$pkg:${TYPO3_VERSION}"
          done
          composer install --prefer-dist --no-progress

      - name: Run functional tests
        env:
          FUNCTIONAL_TEST_COMMAND: ${{ inputs.functional-test-command }}
          UPLOAD_COVERAGE: ${{ inputs.upload-coverage }}
          typo3DatabaseDriver: ${{ inputs.functional-test-db == 'postgres' && 'pdo_pgsql' || 'mysqli' }}
          typo3DatabaseHost: 127.0.0.1
          typo3DatabasePort: ${{ inputs.functional-test-db == 'postgres' && '5432' || '3306' }}
          typo3DatabaseName: typo3_test
          typo3DatabaseUsername: ${{ inputs.functional-test-db == 'postgres' && 'postgres' || 'root' }}
          typo3DatabasePassword: root
        run: |
          SCRIPTS=$(composer run-script --list 2>/dev/null || true)
          if [[ -n "$FUNCTIONAL_TEST_COMMAND" ]]; then
            bash -euo pipefail -c "$FUNCTIONAL_TEST_COMMAND"
          elif echo "$SCRIPTS" | grep -q 'ci:test:php:functional'; then
            if [[ "$UPLOAD_COVERAGE" == "true" ]]; then
              composer ci:test:php:functional -- --coverage-clover=coverage-functional.xml
            else
              composer ci:test:php:functional -- --no-coverage
            fi
          elif echo "$SCRIPTS" | grep -q 'ci:tests:functional'; then
            composer ci:tests:functional
          elif echo "$SCRIPTS" | grep -q 'check:tests:functional'; then
            composer check:tests:functional
          elif echo "$SCRIPTS" | grep -q 'test:functional'; then
            composer test:functional
          else
            echo "::notice::No functional test script found. Skipping. Add ci:test:php:functional to composer scripts or provide functional-test-command input."
          fi

      - name: Upload coverage to Codecov
        if: ${{ inputs.upload-coverage }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-functional.xml
          flags: functional
          fail_ci_if_error: false

