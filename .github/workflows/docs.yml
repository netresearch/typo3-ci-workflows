name: Documentation

on:
  workflow_call:
    inputs:
      input:
        description: 'Path to documentation source'
        required: false
        type: string
        default: 'Documentation'
      output:
        description: 'Path for rendered output'
        required: false
        type: string
        default: 'Documentation-GENERATED-temp'
      upload-artifact:
        description: 'Upload rendered docs as artifact on PRs'
        required: false
        type: boolean
        default: true
      artifact-retention-days:
        description: 'Days to retain uploaded artifact'
        required: false
        type: number
        default: 7

# CALLER REQUIREMENTS
# ===================
# When calling this reusable workflow, the caller's job-level
# `permissions:` block MUST grant at least this full set, otherwise
# the run fails with `startup_failure` before any job executes
# (GitHub rejects the workflow at startup when the reusable declares
# a permission the caller did not grant). NOTE: setting ANY scope in a
# `permissions:` block forces every UNLISTED scope to `none`, and a job
# that omits `permissions:` inherits the repository default
# (default_workflow_permissions) — so a repo hardened to `read` will
# startup-fail here unless these scopes are granted explicitly.
#
#   jobs:
#     render:
#       uses: netresearch/typo3-ci-workflows/.github/workflows/docs.yml@main
#       permissions:
#         contents: read
permissions: {}

env:
  # typo3-documentation/render-guides 0.39.1
  RENDER_GUIDES_IMAGE: ghcr.io/typo3-documentation/render-guides@sha256:6080cbe815ae702e11a932924cdbcf6ec934fbdf9568931a5ed6bafc4b69959c

jobs:
  render:
    name: Render Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Configure Documentation
        env:
          SHELL_VERBOSITY: '3'
          INPUT_PATH: ${{ inputs.input }}
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/project" -w /project \
            -e SHELL_VERBOSITY="${SHELL_VERBOSITY}" \
            "${RENDER_GUIDES_IMAGE}" configure "${INPUT_PATH}"

      - name: Render Documentation
        env:
          SHELL_VERBOSITY: '3'
          INPUT_PATH: ${{ inputs.input }}
          OUTPUT_PATH: ${{ inputs.output }}
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/project" -w /project \
            -e SHELL_VERBOSITY="${SHELL_VERBOSITY}" \
            "${RENDER_GUIDES_IMAGE}" render --config="${INPUT_PATH}" --output="${OUTPUT_PATH}" "${INPUT_PATH}"

      - name: Check for Warnings
        env:
          OUTPUT_PATH: ${{ inputs.output }}
        run: |
          if [ -f "${OUTPUT_PATH}/warnings.txt" ]; then
            echo "Documentation warnings found:"
            cat "${OUTPUT_PATH}/warnings.txt"
          fi

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: inputs.upload-artifact && github.event_name == 'pull_request'
        with:
          name: documentation
          path: ${{ inputs.output }}
          retention-days: ${{ inputs.artifact-retention-days }}
