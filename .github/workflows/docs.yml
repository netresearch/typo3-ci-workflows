name: Documentation

on:
  workflow_call:
    inputs:
      input:
        description: 'Path to documentation source'
        required: false
        type: string
        default: 'Documentation'
      output:
        description: 'Path for rendered output'
        required: false
        type: string
        default: 'Documentation-GENERATED-temp'
      upload-artifact:
        description: 'Upload rendered docs as artifact on PRs'
        required: false
        type: boolean
        default: true
      artifact-retention-days:
        description: 'Days to retain uploaded artifact'
        required: false
        type: number
        default: 7

permissions: {}

env:
  # typo3-documentation/render-guides 0.37.1
  RENDER_GUIDES_IMAGE: ghcr.io/typo3-documentation/render-guides@sha256:2281eeae9bf0b8f490d9be6c8d6a3b64ccb7e178f8dd14a390fc92997524f0c5

jobs:
  render:
    name: Render Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure Documentation
        env:
          SHELL_VERBOSITY: '3'
          INPUT_PATH: ${{ inputs.input }}
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/project" -w /project \
            -e SHELL_VERBOSITY="${SHELL_VERBOSITY}" \
            "${RENDER_GUIDES_IMAGE}" configure "${INPUT_PATH}"

      - name: Render Documentation
        env:
          SHELL_VERBOSITY: '3'
          INPUT_PATH: ${{ inputs.input }}
          OUTPUT_PATH: ${{ inputs.output }}
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/project" -w /project \
            -e SHELL_VERBOSITY="${SHELL_VERBOSITY}" \
            "${RENDER_GUIDES_IMAGE}" render --config="${INPUT_PATH}" --output="${OUTPUT_PATH}" "${INPUT_PATH}"

      - name: Check for Warnings
        env:
          OUTPUT_PATH: ${{ inputs.output }}
        run: |
          if [ -f "${OUTPUT_PATH}/warnings.txt" ]; then
            echo "Documentation warnings found:"
            cat "${OUTPUT_PATH}/warnings.txt"
          fi

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: inputs.upload-artifact && github.event_name == 'pull_request'
        with:
          name: documentation
          path: ${{ inputs.output }}
          retention-days: ${{ inputs.artifact-retention-days }}
