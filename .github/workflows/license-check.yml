name: License Check

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version for license checking'
        required: false
        type: string
        default: '8.4'
      forbidden-licenses:
        description: 'Regex pattern for forbidden license identifiers'
        required: false
        type: string
        default: '"(SSPL|BSL)"'

permissions: {}

jobs:
  preflight:
    # Skip post-merge `push` runs whose SHA was already validated by a
    # successful `merge_group` run on the SAME workflow. The logic is
    # inlined (rather than a composite action) because cross-repo
    # reusable workflows cannot reference a same-repo composite action
    # via `./` syntax, and pinning a self-reference to a SHA creates a
    # chicken-and-egg between workflow change and SHA bump.
    name: Preflight (event gate)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          # Non-push events: never the duplicate case — always run.
          if [ "$EVENT" != "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: event=$EVENT — running."
            exit 0
          fi

          # Push to a non-default branch: merge_group lands on the default
          # branch only, so a same-SHA push elsewhere is a separate context
          # that should still run CI.
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: push to non-default branch ($REF_NAME) — running."
            exit 0
          fi

          # Derive the calling workflow file name from github.workflow_ref
          # (format: <owner>/<repo>/<path>@<ref>).
          WORKFLOW_FILE="${WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE##*/}"
          if [ -z "$WORKFLOW_FILE" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::warning::preflight: could not derive workflow file from \$WORKFLOW_REF — running (fail open)."
            exit 0
          fi

          # Scope the lookup to *this* workflow file only — another workflow
          # succeeding on merge_group for the same SHA does not prove THIS
          # workflow already ran. Failure to query (missing actions:read,
          # transient error) → fail open ("run=true").
          list_url="repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/runs?head_sha=${SHA}&event=merge_group&per_page=100"
          runs_json=$(gh api "$list_url" 2>/dev/null || echo '{"workflow_runs":[]}')

          matched=$(echo "$runs_json" \
            | jq '[.workflow_runs[] | select(.conclusion == "success")] | length' 2>/dev/null \
            || echo 0)
          [[ "$matched" =~ ^[0-9]+$ ]] || matched=0

          if [ "$matched" -gt 0 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: skipping push run — workflow $WORKFLOW_FILE has $matched merge_group run(s) on SHA $SHA already validating this tree."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: running — no qualifying merge_group run for workflow $WORKFLOW_FILE on SHA $SHA."
          fi

  php-licenses:
    needs: preflight
    if: needs.preflight.outputs.run == 'true'
    name: PHP License Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install dependencies
        env:
          COMPOSER_ALLOW_SUPERUSER: '1'
        run: |
          composer config --no-plugins allow-plugins true
          composer config --no-plugins audit.block-insecure false
          composer install --prefer-dist --no-progress

      - name: Check licenses
        env:
          FORBIDDEN_PATTERN: ${{ inputs.forbidden-licenses }}
        run: |
          composer licenses --format=json > licenses.json
          {
            echo "## PHP Dependency Licenses"
            echo '```json'
            head -100 licenses.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if grep -E "$FORBIDDEN_PATTERN" licenses.json; then
            SAFE_PATTERN="${FORBIDDEN_PATTERN//$'\n'/}"
            SAFE_PATTERN="${SAFE_PATTERN//$'\r'/}"
            echo "::error::Found forbidden licenses matching pattern: $SAFE_PATTERN"
            exit 1
          fi
