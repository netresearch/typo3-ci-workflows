name: License Check

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version for license checking'
        required: false
        type: string
        default: '8.4'
      forbidden-licenses:
        description: 'Regex pattern for forbidden license identifiers'
        required: false
        type: string
        default: '"(SSPL|BSL)"'

permissions: {}

jobs:
  preflight:
    # Skip post-merge `push` runs whose SHA was already validated by a
    # successful `merge_group` run. See .github/actions/preflight-gate.
    name: Preflight (event gate)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      actions: read
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - id: gate
        uses: netresearch/typo3-ci-workflows/.github/actions/preflight-gate@main

  php-licenses:
    needs: preflight
    if: needs.preflight.outputs.run == 'true'
    name: PHP License Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install dependencies
        env:
          COMPOSER_ALLOW_SUPERUSER: '1'
        run: |
          composer config --no-plugins allow-plugins true
          composer config --no-plugins audit.block-insecure false
          composer install --prefer-dist --no-progress

      - name: Check licenses
        env:
          FORBIDDEN_PATTERN: ${{ inputs.forbidden-licenses }}
        run: |
          composer licenses --format=json > licenses.json
          {
            echo "## PHP Dependency Licenses"
            echo '```json'
            head -100 licenses.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if grep -E "$FORBIDDEN_PATTERN" licenses.json; then
            SAFE_PATTERN="${FORBIDDEN_PATTERN//$'\n'/}"
            SAFE_PATTERN="${SAFE_PATTERN//$'\r'/}"
            echo "::error::Found forbidden licenses matching pattern: $SAFE_PATTERN"
            exit 1
          fi
