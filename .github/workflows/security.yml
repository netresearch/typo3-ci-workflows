name: Security

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version for composer audit'
        required: false
        type: string
        default: '8.4'
      skip-composer-audit:
        description: 'Skip Composer dependency audit'
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  composer-audit:
    name: Composer Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !inputs.skip-composer-audit }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        env:
          COMPOSER_ALLOW_SUPERUSER: '1'
        run: |
          composer config --no-plugins allow-plugins true
          composer config --no-plugins audit.block-insecure false
          composer install --prefer-dist --no-progress

      - name: Run Composer Audit
        run: composer audit --format=plain --abandoned=report
