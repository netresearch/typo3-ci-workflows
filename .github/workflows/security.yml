name: Security

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version for composer audit'
        required: false
        type: string
        default: '8.4'
      skip-composer-audit:
        description: 'Skip Composer dependency audit'
        required: false
        type: boolean
        default: false
      skip-opengrep:
        description: 'Skip Opengrep SAST scanning'
        required: false
        type: boolean
        default: false
      opengrep-config:
        description: 'Opengrep scan arguments (rules + behavior flags). Default blocks CI on WARNING+ findings; override to e.g. "--config auto" for report-only or "--config auto --error --severity ERROR" for looser gating.'
        required: false
        type: string
        default: '--config auto --error --severity WARNING'

permissions: {}

jobs:
  composer-audit:
    name: Composer Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !inputs.skip-composer-audit }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        env:
          COMPOSER_ALLOW_SUPERUSER: '1'
        run: |
          composer config --no-plugins allow-plugins true
          composer config --no-plugins audit.block-insecure false
          composer install --prefer-dist --no-progress

      - name: Run Composer Audit
        run: composer audit --format=plain --abandoned=report

  opengrep:
    name: SAST (Opengrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !inputs.skip-opengrep }}
    permissions:
      contents: read
      security-events: write
    env:
      # Pinned Opengrep release — bump via renovate/manual PR. Binary is
      # verified by SHA256 below; update both values together.
      OPENGREP_VERSION: v1.19.0
      OPENGREP_SHA256: 1d69a41beb88e8e7917f26cc6a16c1edf298f31402807e6d1afbb5d8684c3590
      OPENGREP_CONFIG: ${{ inputs.opengrep-config }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Opengrep
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/opengrep" \
            "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86"
          echo "${OPENGREP_SHA256}  $HOME/.local/bin/opengrep" | sha256sum -c -
          chmod +x "$HOME/.local/bin/opengrep"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Opengrep scan
        # Default config (--error --severity WARNING) fails this step on
        # WARNING+ findings. The SARIF file is still written on failure,
        # and the upload step below runs with if: always() so findings
        # land in the Security tab even when CI is blocked.
        #
        # `read -ra` tokenises OPENGREP_CONFIG on whitespace into an array
        # WITHOUT glob expansion or word-splitting surprises. Passing
        # "${ARGS[@]}" preserves each arg as a single argv entry, so
        # callers cannot inject shell syntax via this input.
        run: |
          # `read -r -a` tokenises OPENGREP_CONFIG on whitespace into an
          # array WITHOUT backslash interpretation or glob expansion, and
          # passing "${ARGS[@]}" preserves each arg as a single argv entry
          # so callers cannot inject shell syntax via this input.
          #
          # `|| :` absorbs the non-zero exit status `read` returns when
          # OPENGREP_CONFIG is an empty string (no delimiter consumed), so
          # a caller passing `opengrep-config: ''` doesn't abort the step
          # under GitHub Actions' default `bash -e` shell.
          ARGS=()
          read -r -a ARGS <<< "$OPENGREP_CONFIG" || :
          opengrep scan "${ARGS[@]}" --sarif --output opengrep.sarif .

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: opengrep.sarif
          category: opengrep
