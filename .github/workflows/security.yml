name: Security

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version for composer audit'
        required: false
        type: string
        default: '8.4'
      skip-composer-audit:
        description: 'Skip Composer dependency audit'
        required: false
        type: boolean
        default: false
      skip-opengrep:
        description: 'Skip Opengrep SAST scanning'
        required: false
        type: boolean
        default: false
      opengrep-config:
        description: 'Opengrep scan arguments (rules + behavior flags). Default blocks CI on WARNING+ findings; override to e.g. "--config auto" for report-only or "--config auto --error --severity ERROR" for looser gating.'
        required: false
        type: string
        default: '--config auto --error --severity WARNING'

permissions: {}

jobs:
  preflight:
    # Skip post-merge `push` runs whose SHA was already validated by a
    # successful `merge_group` run on the SAME workflow. The logic is
    # inlined (rather than a composite action) because cross-repo
    # reusable workflows cannot reference a same-repo composite action
    # via `./` syntax, and pinning a self-reference to a SHA creates a
    # chicken-and-egg between workflow change and SHA bump.
    name: Preflight (event gate)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      actions: read
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          # Non-push events: never the duplicate case — always run.
          if [ "$EVENT" != "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: event=$EVENT — running."
            exit 0
          fi

          # Push to a non-default branch: merge_group lands on the default
          # branch only, so a same-SHA push elsewhere is a separate context
          # that should still run CI.
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: push to non-default branch ($REF_NAME) — running."
            exit 0
          fi

          # Derive the calling workflow file name from github.workflow_ref
          # (format: <owner>/<repo>/<path>@<ref>).
          WORKFLOW_FILE="${WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE##*/}"
          if [ -z "$WORKFLOW_FILE" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::warning::preflight: could not derive workflow file from \$WORKFLOW_REF — running (fail open)."
            exit 0
          fi

          # Scope the lookup to *this* workflow file only — another workflow
          # succeeding on merge_group for the same SHA does not prove THIS
          # workflow already ran. Failure to query (missing actions:read,
          # transient error) → fail open ("run=true").
          list_url="repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/runs?head_sha=${SHA}&event=merge_group&per_page=100"
          runs_json=$(gh api "$list_url" 2>/dev/null || echo '{"workflow_runs":[]}')

          matched=$(echo "$runs_json" \
            | jq '[.workflow_runs[] | select(.conclusion == "success")] | length' 2>/dev/null \
            || echo 0)
          [[ "$matched" =~ ^[0-9]+$ ]] || matched=0

          if [ "$matched" -gt 0 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: skipping push run — workflow $WORKFLOW_FILE has $matched merge_group run(s) on SHA $SHA already validating this tree."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: running — no qualifying merge_group run for workflow $WORKFLOW_FILE on SHA $SHA."
          fi

  composer-audit:
    needs: preflight
    name: Composer Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !inputs.skip-composer-audit && needs.preflight.outputs.run == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        env:
          COMPOSER_ALLOW_SUPERUSER: '1'
        run: |
          composer config --no-plugins allow-plugins true
          composer config --no-plugins audit.block-insecure false
          composer install --prefer-dist --no-progress

      - name: Run Composer Audit
        run: composer audit --format=plain --abandoned=report

  opengrep:
    needs: preflight
    name: SAST (Opengrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !inputs.skip-opengrep && needs.preflight.outputs.run == 'true' }}
    permissions:
      contents: read
      security-events: write
    env:
      # Pinned Opengrep release — bump via renovate/manual PR. Binary is
      # verified by SHA256 below; update both values together.
      OPENGREP_VERSION: v1.19.0
      OPENGREP_SHA256: 1d69a41beb88e8e7917f26cc6a16c1edf298f31402807e6d1afbb5d8684c3590
      OPENGREP_CONFIG: ${{ inputs.opengrep-config }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Opengrep
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/opengrep" \
            "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86"
          echo "${OPENGREP_SHA256}  $HOME/.local/bin/opengrep" | sha256sum -c -
          chmod +x "$HOME/.local/bin/opengrep"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Opengrep scan
        # Default config (--error --severity WARNING) fails this step on
        # WARNING+ findings. The SARIF file is still written on failure,
        # and the upload step below runs with if: always() so findings
        # land in the Security tab even when CI is blocked.
        #
        # `read -ra` tokenises OPENGREP_CONFIG on whitespace into an array
        # WITHOUT glob expansion or word-splitting surprises. Passing
        # "${ARGS[@]}" preserves each arg as a single argv entry, so
        # callers cannot inject shell syntax via this input.
        run: |
          # `read -r -a` tokenises OPENGREP_CONFIG on whitespace into an
          # array WITHOUT backslash interpretation or glob expansion, and
          # passing "${ARGS[@]}" preserves each arg as a single argv entry
          # so callers cannot inject shell syntax via this input.
          #
          # `|| :` absorbs the non-zero exit status `read` returns when
          # OPENGREP_CONFIG is an empty string (no delimiter consumed), so
          # a caller passing `opengrep-config: ''` doesn't abort the step
          # under GitHub Actions' default `bash -e` shell.
          ARGS=()
          read -r -a ARGS <<< "$OPENGREP_CONFIG" || :
          opengrep scan "${ARGS[@]}" --sarif --output opengrep.sarif .

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: opengrep.sarif
          category: opengrep
