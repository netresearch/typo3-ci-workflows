name: Publish to TER

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version for tailor
        type: string
        default: '8.4'
      ref:
        description: Git ref (tag or SHA) to check out. Defaults to the event ref — set this explicitly when re-triggering from a workflow_dispatch against a branch to ensure the correct source is packaged.
        required: false
        type: string
        default: ''
      verify-timeout-minutes:
        description: Max minutes to wait for TER to serve the published version
        required: false
        type: number
        default: 10
      verify-poll-interval-seconds:
        description: Seconds between TER verification polls
        required: false
        type: number
        default: 30
      update-metadata:
        description: >-
          After publishing, sync the TER listing's composer/issues/repository
          URLs via `tailor ter:update`. The manual URL is only written
          when `manual-url` is explicitly set (empty preserves TER's
          existing value). Safe to re-run; TER overwrites each supplied
          field.
        required: false
        type: boolean
        default: true
      manual-url:
        description: >-
          URL for TER's "External manual" field. If empty (default), the
          existing value on TER is preserved -- in particular, TYPO3
          extensions with composer-docs auto-publish should leave this
          empty so TER auto-links the "Extension Manual" button to
          docs.typo3.org/p/<vendor>/<package>/<major>.<minor>/en-us.
          If set, overwrites TER's field with the supplied URL on every
          publish (idempotent). Set to a real docs URL only if your
          extension does NOT auto-publish to docs.typo3.org.
        required: false
        type: string
        default: ''
      issues-url:
        description: Override for the "issues" URL in TER metadata. Defaults to ${repo}/issues.
        required: false
        type: string
        default: ''
      repository-url:
        description: Override for the "repository" URL in TER metadata. Defaults to the GitHub repo URL.
        required: false
        type: string
        default: ''
    secrets:
      TYPO3_EXTENSION_KEY:
        description: "Deprecated: extension key is auto-resolved from composer.json"
        required: false
      TYPO3_TER_ACCESS_TOKEN:
        required: true

permissions: {}

jobs:
  publish:
    name: Publish to TER
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Resolve version
        id: version
        env:
          GIT_REF: ${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract version from ext_emconf.php (single source of truth)
          if [[ ! -f ext_emconf.php ]]; then
            echo "::error::ext_emconf.php not found"
            exit 1
          fi
          VERSION=$(sed -nE "s/.*'version'[[:space:]]*=>[[:space:]]*'([^']+)'.*/\1/p" ext_emconf.php)
          if [[ -z "$VERSION" ]]; then
            echo "::error file=ext_emconf.php::Could not extract version"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format in ext_emconf.php: $VERSION"
            exit 1
          fi

          # When triggered by tag push, validate tag matches ext_emconf.php
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            TAG="${GIT_REF#refs/tags/}"
            TAG_VERSION="${TAG#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match ext_emconf.php ($VERSION)"
              exit 1
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION (from tag $TAG)"
          else
            # Non-tag ref: runs for any caller that didn't dispatch against
            # a git tag. The most common case is a workflow_dispatch-only
            # caller (the t3x-nr-llm / t3x-nr-mcp-agent pattern) where
            # GitHub rejects `--ref <tag>` when the caller file doesn't
            # exist at that tag, forcing callers onto a branch ref instead.
            # But this branch also runs if a caller chooses to invoke the
            # reusable workflow on a branch push, schedule, or
            # pull_request event. In all cases the release tag cannot be
            # derived from $GIT_REF, so we resolve it from the
            # ext_emconf.php version instead -- so the "Get release
            # comment" step downstream can still fetch the GitHub release
            # body as the TER upload comment. Try 'v${VERSION}' first
            # (signed-tag convention), fall back to bare '${VERSION}'
            # (historic).
            TAG=""
            if gh release view "v${VERSION}" --json tagName --jq .tagName >/dev/null 2>&1; then
              TAG="v${VERSION}"
            elif gh release view "${VERSION}" --json tagName --jq .tagName >/dev/null 2>&1; then
              TAG="${VERSION}"
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            if [[ -n "$TAG" ]]; then
              echo "Version $VERSION (non-tag ref, derived release tag: $TAG)"
            else
              echo "::warning::No GitHub release found for version $VERSION (tried 'v$VERSION' and '$VERSION') -- TER upload comment will be the default short link"
              echo "Version $VERSION (non-tag ref, no matching release tag)"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          extensions: intl, mbstring, json, zip, curl
          tools: composer:v2

      - name: Install tailor
        run: composer global require typo3/tailor:^1 --prefer-dist --no-progress

      - name: Resolve extension key from composer.json
        id: extkey
        run: |
          KEY=$(php -r "echo json_decode(file_get_contents('composer.json'), true)['extra']['typo3/cms']['extension-key'] ?? '';")
          if [[ -z "$KEY" ]]; then
            echo "::error file=composer.json::Missing extension-key in extra.typo3/cms"
            exit 1
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "Extension key: $KEY"

      - name: Get release comment
        id: comment
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT=""

          # 1. Prefer GitHub release notes (curated, may cover multiple versions)
          if [[ -n "$TAG" ]]; then
            RELEASE_BODY=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || true)
            if [[ -n "${RELEASE_BODY// }" ]]; then
              # Strip HTML tags and limit length for TER (max ~2000 chars).
              # Truncation is CHARACTER-based, not byte-based: `head -c`
              # splits multi-byte UTF-8 sequences (emoji, em-dashes,
              # accented characters) mid-codepoint and TER rejects the
              # resulting invalid UTF-8. Use python3 with explicit UTF-8
              # decoding: guaranteed-stable slicing on codepoints,
              # doesn't depend on whether the runner's `awk` is gawk or
              # mawk (ubuntu-latest historically ships both), doesn't
              # fold blank lines (no RS="" paragraph mode), and preserves
              # leading/trailing whitespace verbatim.
              #
              # `printf '%s'` (not `echo`) so that release bodies starting
              # with `-n` / `-e` / `--` are passed through literally
              # rather than interpreted as echo's own options.
              COMMENT=$(
                printf '%s' "$RELEASE_BODY" \
                  | sed 's/<[^>]*>//g' \
                  | python3 -c 'import sys; sys.stdout.write(sys.stdin.read()[:1900])'
              )
            fi
          fi

          # 2. Fall back to commit log since previous tag
          if [[ -z "${COMMENT// }" ]] && [[ -n "$TAG" ]]; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [[ -n "$PREVIOUS_TAG" ]]; then
              LOG=$(git log --pretty=format:"- %s" "${PREVIOUS_TAG}..HEAD" -- 2>/dev/null || true)
            fi
            # Fall back to tag annotation
            if [[ -z "${LOG// }" ]]; then
              LOG=$(git tag -n10 -l "$TAG" | sed "s/^[0-9v.]*[ ]*//" || true)
            fi
            if [[ -n "${LOG// }" ]]; then
              # Same character-level truncation as the release-body branch
              # above — git log / tag annotations can also exceed TER's
              # ~2000 char limit and the final comment must fit regardless
              # of source.
              COMMENT=$(
                printf '%s' "$LOG" \
                  | python3 -c 'import sys; sys.stdout.write(sys.stdin.read()[:1900])'
              )
            fi
          fi

          # 3. Append link to GitHub releases
          if [[ -n "${COMMENT// }" ]]; then
            COMMENT="${COMMENT}

          For details see $SERVER_URL/$REPO/releases"
          else
            COMMENT="Released version $VERSION -- for details see $SERVER_URL/$REPO/releases"
          fi

          DELIMITER="ghadelim_$(openssl rand -hex 8)"
          {
            echo "comment<<$DELIMITER"
            echo "$COMMENT"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Check if version is already on TER
        id: precheck
        env:
          KEY: ${{ steps.extkey.outputs.key }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # HEAD the download URL: 200 => version already published, skip.
          # This makes the workflow idempotent so republishing a tag after a
          # partial failure is a safe no-op on the TER side.
          URL="https://extensions.typo3.org/extension/download/${KEY}/${VERSION}/zip"
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' -I --max-time 15 "$URL" || echo "000")
          if [[ "$STATUS" == "200" ]]; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is already on TER — skipping publish"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
            echo "TER precheck status for $VERSION: $STATUS (will publish)"
          fi

      - name: Publish to TER
        if: steps.precheck.outputs.already-published != 'true'
        env:
          TYPO3_EXTENSION_KEY: ${{ steps.extkey.outputs.key }}
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          COMMENT: ${{ steps.comment.outputs.comment }}
        run: php ~/.composer/vendor/bin/tailor ter:publish --comment="$COMMENT" "$VERSION"

      - name: Verify TER serves the version
        env:
          KEY: ${{ steps.extkey.outputs.key }}
          VERSION: ${{ steps.version.outputs.version }}
          TIMEOUT_MINUTES: ${{ inputs.verify-timeout-minutes }}
          POLL_INTERVAL: ${{ inputs.verify-poll-interval-seconds }}
        run: |
          URL="https://extensions.typo3.org/extension/download/${KEY}/${VERSION}/zip"
          DEADLINE=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))
          ATTEMPT=0
          while true; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' -I --max-time 15 "$URL" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "TER serves $VERSION (attempt $ATTEMPT)"
              exit 0
            fi
            if [[ $(date +%s) -ge $DEADLINE ]]; then
              echo "::error::Timed out waiting for TER to serve $VERSION (last status: $STATUS)"
              exit 1
            fi
            echo "Attempt $ATTEMPT: status $STATUS, retrying in ${POLL_INTERVAL}s"
            sleep "$POLL_INTERVAL"
          done

      - name: Update TER metadata
        # Keeps the TER listing's Manual / Issues / Repository links current.
        # Idempotent — TER overwrites with the supplied values on every call.
        # Runs regardless of the idempotency precheck: even when the version
        # was already on TER, the metadata may have drifted (e.g. repo
        # renamed) and this step reconciles it.
        if: inputs.update-metadata
        env:
          KEY: ${{ steps.extkey.outputs.key }}
          PACKAGE: ${{ github.repository }}
          COMPOSER_NAME: ''
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          MANUAL_INPUT: ${{ inputs.manual-url }}
          ISSUES_INPUT: ${{ inputs.issues-url }}
          REPOSITORY_INPUT: ${{ inputs.repository-url }}
        run: |
          # Composer name is kept in sync with the local composer.json rather
          # than plumbed as a separate input — the source of truth is already
          # on the checked-out ref and will never disagree with what we just
          # published.
          COMPOSER_NAME=$(php -r "echo json_decode(file_get_contents('composer.json'), true)['name'] ?? '';")
          if [[ -z "$COMPOSER_NAME" ]]; then
            echo "::error file=composer.json::Missing 'name' field — required for TER metadata update"
            exit 1
          fi

          REPO_URL="${SERVER_URL}/${REPO}"
          ISSUES_URL="${ISSUES_INPUT:-${REPO_URL}/issues}"
          REPOSITORY_URL="${REPOSITORY_INPUT:-$REPO_URL}"

          # Build the tailor argv in an array. --manual is appended ONLY
          # when manual-url is explicitly set -- empty means "preserve
          # TER's existing value" so composer-docs auto-publish consumers
          # keep their docs.typo3.org/p/... auto-link intact.
          TAILOR_ARGS=(
            "--composer=$COMPOSER_NAME"
            "--issues=$ISSUES_URL"
            "--repository=$REPOSITORY_URL"
          )

          echo "Updating TER metadata for $KEY:"
          echo "  composer=$COMPOSER_NAME"
          if [[ -n "$MANUAL_INPUT" ]]; then
            TAILOR_ARGS+=("--manual=$MANUAL_INPUT")
            echo "  manual=$MANUAL_INPUT"
          else
            echo "  manual=(preserving TER's existing value)"
          fi
          echo "  issues=$ISSUES_URL"
          echo "  repository=$REPOSITORY_URL"

          php ~/.composer/vendor/bin/tailor ter:update "${TAILOR_ARGS[@]}" "$KEY"
