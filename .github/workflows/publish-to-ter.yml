name: Publish to TER

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version for tailor
        type: string
        default: '8.4'
    secrets:
      TYPO3_EXTENSION_KEY:
        description: "Deprecated: extension key is auto-resolved from composer.json"
        required: false
      TYPO3_TER_ACCESS_TOKEN:
        required: true

permissions: {}

jobs:
  publish:
    name: Publish to TER
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Resolve version
        id: version
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          # Extract version from ext_emconf.php (single source of truth)
          if [[ ! -f ext_emconf.php ]]; then
            echo "::error::ext_emconf.php not found"
            exit 1
          fi
          VERSION=$(sed -nE "s/.*'version'[[:space:]]*=>[[:space:]]*'([^']+)'.*/\1/p" ext_emconf.php)
          if [[ -z "$VERSION" ]]; then
            echo "::error file=ext_emconf.php::Could not extract version"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format in ext_emconf.php: $VERSION"
            exit 1
          fi

          # When triggered by tag push, validate tag matches ext_emconf.php
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            TAG="${GIT_REF#refs/tags/}"
            TAG_VERSION="${TAG#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match ext_emconf.php ($VERSION)"
              exit 1
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION (from tag $TAG)"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION (manual trigger)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          extensions: intl, mbstring, json, zip, curl
          tools: composer:v2

      - name: Install tailor
        run: composer global require typo3/tailor:^1 --prefer-dist --no-progress

      - name: Resolve extension key from composer.json
        id: extkey
        run: |
          KEY=$(php -r "echo json_decode(file_get_contents('composer.json'), true)['extra']['typo3/cms']['extension-key'] ?? '';")
          if [[ -z "$KEY" ]]; then
            echo "::error file=composer.json::Missing extension-key in extra.typo3/cms"
            exit 1
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "Extension key: $KEY"

      - name: Get release comment
        id: comment
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT=""

          # 1. Prefer GitHub release notes (curated, may cover multiple versions)
          if [[ -n "$TAG" ]]; then
            RELEASE_BODY=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || true)
            if [[ -n "${RELEASE_BODY// }" ]]; then
              # Strip HTML tags and limit length for TER (max ~2000 chars)
              COMMENT=$(echo "$RELEASE_BODY" | sed 's/<[^>]*>//g' | head -c 1900)
            fi
          fi

          # 2. Fall back to commit log since previous tag
          if [[ -z "${COMMENT// }" ]] && [[ -n "$TAG" ]]; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [[ -n "$PREVIOUS_TAG" ]]; then
              LOG=$(git log --pretty=format:"- %s" "${PREVIOUS_TAG}..HEAD" -- 2>/dev/null || true)
            fi
            # Fall back to tag annotation
            if [[ -z "${LOG// }" ]]; then
              LOG=$(git tag -n10 -l "$TAG" | sed "s/^[0-9v.]*[ ]*//" || true)
            fi
            if [[ -n "${LOG// }" ]]; then
              COMMENT="${LOG}"
            fi
          fi

          # 3. Append link to GitHub releases
          if [[ -n "${COMMENT// }" ]]; then
            COMMENT="${COMMENT}

          For details see $SERVER_URL/$REPO/releases"
          else
            COMMENT="Released version $VERSION -- for details see $SERVER_URL/$REPO/releases"
          fi

          DELIMITER="ghadelim_$(openssl rand -hex 8)"
          {
            echo "comment<<$DELIMITER"
            echo "$COMMENT"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to TER
        env:
          TYPO3_EXTENSION_KEY: ${{ steps.extkey.outputs.key }}
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          COMMENT: ${{ steps.comment.outputs.comment }}
        run: php ~/.composer/vendor/bin/tailor ter:publish --comment="$COMMENT" "$VERSION"
