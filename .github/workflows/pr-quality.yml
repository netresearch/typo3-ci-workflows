# Moved to netresearch/.github — this wrapper provides backward compatibility.
# New repos should use: netresearch/.github/.github/workflows/pr-quality.yml@main
name: PR Quality Gates

on:
  workflow_call:
    inputs:
      size-warning-threshold:
        description: 'Lines changed threshold for medium size label'
        required: false
        type: number
        default: 500
      size-alert-threshold:
        description: 'Lines changed threshold for large size warning'
        required: false
        type: number
        default: 1000
      security-controls-path:
        description: 'Path to security controls documentation'
        required: false
        type: string
        default: '.github/SECURITY_CONTROLS.md'

permissions: {}

jobs:
  quality-gate:
    uses: netresearch/.github/.github/workflows/pr-quality.yml@719efa1363a09402610a5e515f668eff54ec4e23 # main
    with:
      size-warning-threshold: ${{ inputs.size-warning-threshold }}
      size-alert-threshold: ${{ inputs.size-alert-threshold }}
      security-controls-path: ${{ inputs.security-controls-path }}
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit
