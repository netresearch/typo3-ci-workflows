name: Fuzzing

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version for fuzz and mutation tests'
        required: false
        type: string
        default: '8.4'
      php-extensions:
        description: 'PHP extensions to install (comma-separated)'
        required: false
        type: string
        default: 'intl, mbstring, xml'
      fuzz-testsuite:
        description: 'PHPUnit testsuite name for fuzz tests'
        required: false
        type: string
        default: 'Fuzz'
      phpunit-config:
        description: 'Path to PHPUnit config file'
        required: false
        type: string
        default: 'Build/phpunit.xml'
      run-fuzz-tests:
        description: 'Run fuzz tests'
        required: false
        type: boolean
        default: false
      run-mutation-tests:
        description: 'Run mutation tests with Infection'
        required: false
        type: boolean
        default: false
      mutation-min-msi:
        description: 'Minimum Mutation Score Indicator'
        required: false
        type: number
        default: 50
      mutation-min-covered-msi:
        description: 'Minimum Covered Mutation Score Indicator'
        required: false
        type: number
        default: 60

permissions: {}

jobs:
  preflight:
    # Skip post-merge `push` runs whose SHA was already validated by a
    # successful `merge_group` run on the SAME workflow. The logic is
    # inlined (rather than a composite action) because cross-repo
    # reusable workflows cannot reference a same-repo composite action
    # via `./` syntax, and pinning a self-reference to a SHA creates a
    # chicken-and-egg between workflow change and SHA bump.
    name: Preflight (event gate)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          # Non-push events: never the duplicate case — always run.
          if [ "$EVENT" != "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: event=$EVENT — running."
            exit 0
          fi

          # Push to a non-default branch: merge_group lands on the default
          # branch only, so a same-SHA push elsewhere is a separate context
          # that should still run CI.
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: push to non-default branch ($REF_NAME) — running."
            exit 0
          fi

          # Derive the calling workflow file name from github.workflow_ref
          # (format: <owner>/<repo>/<path>@<ref>).
          WORKFLOW_FILE="${WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE##*/}"
          if [ -z "$WORKFLOW_FILE" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::warning::preflight: could not derive workflow file from \$WORKFLOW_REF — running (fail open)."
            exit 0
          fi

          # Scope the lookup to *this* workflow file only — another workflow
          # succeeding on merge_group for the same SHA does not prove THIS
          # workflow already ran. Failure to query (missing actions:read,
          # transient error) → fail open ("run=true").
          list_url="repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/runs?head_sha=${SHA}&event=merge_group&per_page=100"
          runs_json=$(gh api "$list_url" 2>/dev/null || echo '{"workflow_runs":[]}')

          matched=$(echo "$runs_json" \
            | jq '[.workflow_runs[] | select(.conclusion == "success")] | length' 2>/dev/null \
            || echo 0)
          [[ "$matched" =~ ^[0-9]+$ ]] || matched=0

          if [ "$matched" -gt 0 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: skipping push run — workflow $WORKFLOW_FILE has $matched merge_group run(s) on SHA $SHA already validating this tree."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::preflight: running — no qualifying merge_group run for workflow $WORKFLOW_FILE on SHA $SHA."
          fi

  fuzz-tests:
    needs: preflight
    name: Fuzz Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.run-fuzz-tests && needs.preflight.outputs.run == 'true'
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-fuzz-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-fuzz-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run Fuzz Tests
        env:
          PHPUNIT_CONFIG: ${{ inputs.phpunit-config }}
          FUZZ_SUITE: ${{ inputs.fuzz-testsuite }}
        run: .Build/bin/phpunit -c "$PHPUNIT_CONFIG" --testsuite "$FUZZ_SUITE" --no-coverage --colors=never

  mutation-testing:
    needs: preflight
    name: Mutation Testing (Infection)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.run-mutation-tests && needs.preflight.outputs.run == 'true'
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-mutation-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-mutation-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run Mutation Tests
        env:
          MIN_MSI: ${{ inputs.mutation-min-msi }}
          MIN_COVERED_MSI: ${{ inputs.mutation-min-covered-msi }}
        run: composer ci:test:php:mutation -- --min-msi="$MIN_MSI" --min-covered-msi="$MIN_COVERED_MSI"
        continue-on-error: true
