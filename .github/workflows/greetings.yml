# Moved to netresearch/.github — this wrapper provides backward compatibility.
# New repos should use: netresearch/.github/.github/workflows/greetings.yml@main
name: Greetings

on:
  workflow_call:
    inputs:
      issue-message:
        description: 'Message for first-time issue authors'
        required: false
        type: string
        default: |
          Thanks for opening your first issue! We appreciate you taking the time to report this.
          A maintainer will review your issue soon.
      pr-message:
        description: 'Message for first-time PR authors'
        required: false
        type: string
        default: |
          Thanks for your first pull request! We are excited to have you contribute.
          A maintainer will review your PR soon. Please ensure all CI checks pass.

permissions: {}

jobs:
  greeting:
    uses: netresearch/.github/.github/workflows/greetings.yml@ac02398d6b2413d9677ec97763b4c8173b605695 # main
    with:
      issue-message: ${{ inputs.issue-message }}
      pr-message: ${{ inputs.pr-message }}
    permissions:
      issues: write
      pull-requests: write
    secrets: inherit
