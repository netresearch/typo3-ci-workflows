name: Extended Testing

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version for coverage runs
        required: false
        type: string
        default: '8.5'
      node-version:
        description: Node.js version for JS testing
        required: false
        type: string
        default: '24'
      run-unit-tests:
        description: Run PHP unit tests with coverage
        required: false
        type: boolean
        default: true
      run-functional-tests:
        description: Run PHP functional tests with coverage
        required: false
        type: boolean
        default: true
      run-integration-tests:
        description: Run PHP integration tests with coverage
        required: false
        type: boolean
        default: false
      run-e2e-tests:
        description: Run PHP E2E tests with coverage
        required: false
        type: boolean
        default: false
      run-js-tests:
        description: Run JavaScript tests (Vitest)
        required: false
        type: boolean
        default: true
      run-mutation-tests:
        description: Run PHP mutation testing (Infection)
        required: false
        type: boolean
        default: true
      run-fuzz-tests:
        description: Run PHP fuzz tests
        required: false
        type: boolean
        default: true
      unit-test-config:
        description: PHPUnit config for unit tests
        required: false
        type: string
        default: 'Build/phpunit/UnitTests.xml'
      functional-test-config:
        description: PHPUnit config for functional tests
        required: false
        type: string
        default: 'Build/phpunit/FunctionalTests.xml'
      integration-test-config:
        description: PHPUnit config for integration tests
        required: false
        type: string
        default: 'Build/phpunit/IntegrationTests.xml'
      e2e-test-config:
        description: PHPUnit config for E2E tests
        required: false
        type: string
        default: 'Build/phpunit/E2ETests.xml'
    secrets:
      CODECOV_TOKEN:
        required: false
      INFECTION_DASHBOARD_API_KEY:
        required: false

# CALLER REQUIREMENTS
# ===================
# When calling this reusable workflow, the caller's job-level
# `permissions:` block MUST grant at least this full set, otherwise
# the run fails with `startup_failure` before any job executes
# (GitHub rejects the workflow at startup when the reusable declares
# a permission the caller did not grant). NOTE: setting ANY scope in a
# `permissions:` block forces every UNLISTED scope to `none`, and a job
# that omits `permissions:` inherits the repository default
# (default_workflow_permissions) — so a repo hardened to `read` will
# startup-fail here unless these scopes are granted explicitly.
#
#   jobs:
#     unit-coverage:
#       uses: netresearch/typo3-ci-workflows/.github/workflows/extended-testing.yml@main
#       permissions:
#         contents: read
permissions: {}

jobs:
  unit-coverage:
    name: Unit Coverage
    if: inputs.run-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.unit-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="Unit Tests" \
            --coverage-clover=.Build/coverage/unit-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: .Build/coverage/unit-clover.xml
          flags: php-unit
          name: php-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  functional-coverage:
    name: Functional Coverage
    if: inputs.run-functional-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.functional-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="Functional Tests" \
            --coverage-clover=.Build/coverage/functional-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: .Build/coverage/functional-clover.xml
          flags: php-functional
          name: php-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-coverage:
    name: Integration Coverage
    if: inputs.run-integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.integration-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="Integration Tests" \
            --coverage-clover=.Build/coverage/integration-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: .Build/coverage/integration-clover.xml
          flags: php-integration
          name: php-integration
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-coverage:
    name: E2E Coverage
    if: inputs.run-e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.e2e-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="E2E Tests" \
            --coverage-clover=.Build/coverage/e2e-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: .Build/coverage/e2e-clover.xml
          flags: php-e2e
          name: php-e2e
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  mutation-testing:
    name: Mutation Testing (PHP)
    if: inputs.run-mutation-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-coverage
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Generate coverage for Infection
        env:
          UNIT_CONFIG: ${{ inputs.unit-test-config }}
        run: |
          mkdir -p .Build/logs
          .Build/bin/phpunit -c "$UNIT_CONFIG" \
            --testsuite="Unit Tests" \
            --coverage-xml=.Build/logs/coverage-xml \
            --log-junit=.Build/logs/junit.xml

      - name: Run mutation testing
        env:
          INFECTION_DASHBOARD_API_KEY: ${{ secrets.INFECTION_DASHBOARD_API_KEY }}
        run: |
          .Build/bin/infection --threads=4 --no-progress --logger-github \
            --skip-initial-tests --coverage=.Build/logs \
            --test-framework-options="--testsuite='Unit Tests'"

  js-coverage:
    name: JavaScript Coverage
    if: inputs.run-js-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload JS coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          flags: javascript
          name: js-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  fuzz-testing:
    name: Fuzz Testing (PHP)
    if: inputs.run-fuzz-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run fuzz tests
        env:
          UNIT_CONFIG: ${{ inputs.unit-test-config }}
        run: |
          .Build/bin/phpunit -c "$UNIT_CONFIG" \
            --testsuite="Unit Tests" \
            --group=fuzz
