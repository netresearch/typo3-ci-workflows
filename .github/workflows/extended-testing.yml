name: Extended Testing

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version for coverage runs
        required: false
        type: string
        default: '8.5'
      node-version:
        description: Node.js version for JS testing
        required: false
        type: string
        default: '24'
      run-unit-tests:
        description: Run PHP unit tests with coverage
        required: false
        type: boolean
        default: true
      run-functional-tests:
        description: Run PHP functional tests with coverage
        required: false
        type: boolean
        default: true
      run-integration-tests:
        description: Run PHP integration tests with coverage
        required: false
        type: boolean
        default: false
      run-e2e-tests:
        description: Run PHP E2E tests with coverage
        required: false
        type: boolean
        default: false
      run-js-tests:
        description: Run JavaScript tests (Vitest)
        required: false
        type: boolean
        default: true
      run-mutation-tests:
        description: Run PHP mutation testing (Infection)
        required: false
        type: boolean
        default: true
      run-fuzz-tests:
        description: Run PHP fuzz tests
        required: false
        type: boolean
        default: true
      unit-test-config:
        description: PHPUnit config for unit tests
        required: false
        type: string
        default: 'Build/phpunit/UnitTests.xml'
      functional-test-config:
        description: PHPUnit config for functional tests
        required: false
        type: string
        default: 'Build/phpunit/FunctionalTests.xml'
      integration-test-config:
        description: PHPUnit config for integration tests
        required: false
        type: string
        default: 'Build/phpunit/IntegrationTests.xml'
      e2e-test-config:
        description: PHPUnit config for E2E tests
        required: false
        type: string
        default: 'Build/phpunit/E2ETests.xml'
    secrets:
      CODECOV_TOKEN:
        required: false
      INFECTION_DASHBOARD_API_KEY:
        required: false

permissions: {}

jobs:
  unit-coverage:
    name: Unit Coverage
    if: inputs.run-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.unit-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="Unit Tests" \
            --coverage-clover=.Build/coverage/unit-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: .Build/coverage/unit-clover.xml
          flags: php-unit
          name: php-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  functional-coverage:
    name: Functional Coverage
    if: inputs.run-functional-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.functional-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="Functional Tests" \
            --coverage-clover=.Build/coverage/functional-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: .Build/coverage/functional-clover.xml
          flags: php-functional
          name: php-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-coverage:
    name: Integration Coverage
    if: inputs.run-integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.integration-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="Integration Tests" \
            --coverage-clover=.Build/coverage/integration-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: .Build/coverage/integration-clover.xml
          flags: php-integration
          name: php-integration
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-coverage:
    name: E2E Coverage
    if: inputs.run-e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run tests with coverage
        env:
          PHPUNIT_CONFIG: ${{ inputs.e2e-test-config }}
        run: |
          mkdir -p .Build/coverage
          .Build/bin/phpunit -c "$PHPUNIT_CONFIG" \
            --testsuite="E2E Tests" \
            --coverage-clover=.Build/coverage/e2e-clover.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: .Build/coverage/e2e-clover.xml
          flags: php-e2e
          name: php-e2e
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  mutation-testing:
    name: Mutation Testing (PHP)
    if: inputs.run-mutation-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-coverage
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Generate coverage for Infection
        env:
          UNIT_CONFIG: ${{ inputs.unit-test-config }}
        run: |
          mkdir -p .Build/logs
          .Build/bin/phpunit -c "$UNIT_CONFIG" \
            --testsuite="Unit Tests" \
            --coverage-xml=.Build/logs/coverage-xml \
            --log-junit=.Build/logs/junit.xml

      - name: Run mutation testing
        env:
          INFECTION_DASHBOARD_API_KEY: ${{ secrets.INFECTION_DASHBOARD_API_KEY }}
        run: |
          .Build/bin/infection --threads=4 --no-progress --logger-github \
            --skip-initial-tests --coverage=.Build/logs \
            --test-framework-options="--testsuite='Unit Tests'"

  js-coverage:
    name: JavaScript Coverage
    if: inputs.run-js-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload JS coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage/lcov.info
          flags: javascript
          name: js-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  fuzz-testing:
    name: Fuzz Testing (PHP)
    if: inputs.run-fuzz-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run fuzz tests
        env:
          UNIT_CONFIG: ${{ inputs.unit-test-config }}
        run: |
          .Build/bin/phpunit -c "$UNIT_CONFIG" \
            --testsuite="Unit Tests" \
            --group=fuzz
