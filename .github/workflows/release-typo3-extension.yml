name: Release (TYPO3 extension)

# Orchestrator for the full TYPO3-extension release pipeline.
#
# Order of operations (immutability-friendly):
#
#   1. build-and-sign — create archives, SBOMs, checksums, Cosign signatures,
#      build-provenance attestations. Uploads everything as the `dist` run
#      artifact. No external publishing yet.
#   2. publish-to-ter, verify-packagist, verify-docs — all run in parallel
#      after the build succeeds. docs.typo3.org renders via Intercept's
#      GitHub-push webhook (independent of TER), so the docs verifier is not
#      coupled to the TER publish. Each sub-workflow is idempotent and polls
#      its respective service until the new version is visible.
#   3. create-release — the GitHub release is created LAST, in a single
#      atomic `softprops/action-gh-release` call, with every artifact and the
#      verification-evidence block already determined. Compatible with GitHub
#      "Immutable Releases": nothing is added, removed, or edited after
#      publication.
#
# If any of step 2's sub-jobs fail, step 3 is skipped: no release is created,
# the tag exists without a GitHub release, and the maintainer re-runs the
# whole orchestrator (which is idempotent on every publish step) to finish.
# The `republish.yml` dispatcher is for recovering a completed release whose
# publishes later regressed — not for mid-release crashes.

on:
  workflow_call:
    inputs:
      archive-prefix:
        description: 'Prefix for release archive files (e.g., "nr-passkeys-be")'
        required: true
        type: string
      package-name:
        description: 'Composer package name (e.g., "netresearch/nr-passkeys-be")'
        required: true
        type: string
      extension-key:
        description: 'TYPO3 extension key (e.g., "nr_passkeys_be")'
        required: true
        type: string
      vendor:
        description: |
          Deprecated, no longer consumed. The docs.typo3.org URL is derived
          from package-name now. Safe to omit.
        required: false
        type: string
        default: ''
      include-sbom:
        description: Include SPDX and CycloneDX SBOMs as release assets
        required: false
        type: boolean
        default: true
      sign-artifacts:
        description: Sign artifacts with Cosign keyless signing
        required: false
        type: boolean
        default: true
      skip-ter:
        description: Skip TER publish + verification (for testing only)
        required: false
        type: boolean
        default: false
      skip-packagist:
        description: Skip Packagist publish + verification
        required: false
        type: boolean
        default: false
      skip-docs:
        description: Skip docs.typo3.org verification
        required: false
        type: boolean
        default: false
    secrets:
      TYPO3_TER_ACCESS_TOKEN:
        required: false

permissions: {}

jobs:
  build-and-sign:
    name: Build & sign artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      release-notes: ${{ steps.notes.outputs.notes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Preflight TER token
        # When `secrets:` is mapped explicitly on a `uses:` job, GitHub
        # Actions treats the entry as "present" regardless of whether the
        # value resolved to a real string or an empty one — so the
        # called workflow's `required: true` declaration is satisfied
        # even if the consumer never set the secret. Fail here with a
        # clear message instead of letting `tailor ter:publish` fail
        # later with a less direct API auth error.
        if: ${{ !inputs.skip-ter }}
        env:
          TER_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
        run: |
          if [[ -z "$TER_TOKEN" ]]; then
            echo "::error::TYPO3_TER_ACCESS_TOKEN secret is required when skip-ter=false"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve version from tag
        id: version
        env:
          ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version derived from tag: $GITHUB_REF_NAME"
            exit 1
          fi
          if [[ "$ARCHIVE_PREFIX" == *..* ]] || [[ "$ARCHIVE_PREFIX" == /* ]]; then
            echo "::error::Invalid archive-prefix: $ARCHIVE_PREFIX"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        # Phase 1: one line per merge commit on main (PR title with #N). Avoids
        # the duplicate "feature-branch commit + merge commit" noise the naive
        # `git log` produced. Phase 3 swaps this for git-cliff + contributor
        # and issue-reporter attribution.
        run: |
          DELIMITER="ghadelim_$(openssl rand -hex 8)"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "notes<<$DELIMITER"
            if [[ -z "$PREVIOUS_TAG" ]]; then
              echo "Initial release"
            else
              # --first-parent gives one line per commit on the trunk's
              # first-parent line: merge commits (PR title with "#N")
              # *and* any direct hotfix commits that landed straight on
              # main without a PR. The earlier `--first-parent --merges`
              # variant dropped direct commits whenever the range
              # contained at least one merge — a release that mixed both
              # would silently lose the direct ones.
              # Falls back to --no-merges if --first-parent returns
              # empty (rebase-merge strategy with squash + linear history
              # rooted on a non-trunk branch — uncommon, but harmless).
              LOG=$(git log --first-parent --pretty=format:"- %s" "${PREVIOUS_TAG}..HEAD")
              if [[ -z "${LOG// }" ]]; then
                LOG=$(git log --no-merges --pretty=format:"- %s" "${PREVIOUS_TAG}..HEAD")
              fi
              echo "$LOG"
              echo ""
            fi
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create release archives
        env:
          ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          git archive --format=zip --prefix="${ARCHIVE_PREFIX}/" HEAD -o "dist/${ARCHIVE_PREFIX}-${VERSION}.zip"
          git archive --format=tar.gz --prefix="${ARCHIVE_PREFIX}/" HEAD -o "dist/${ARCHIVE_PREFIX}-${VERSION}.tar.gz"

      - name: Generate SBOM (SPDX)
        if: inputs.include-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.sbom.spdx.json

      - name: Generate SBOM (CycloneDX)
        if: inputs.include-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.sbom.cdx.json

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > checksums.txt
          cat checksums.txt

      - name: Install Cosign
        if: inputs.sign-artifacts
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifacts with Cosign (keyless)
        if: inputs.sign-artifacts
        run: |
          cd dist
          for file in *; do
            [ -f "$file" ] || continue
            case "$file" in
              *.sigstore.json) continue ;;  # don't sign already-generated signature bundles
            esac
            # Use .sigstore.json (Sigstore bundle format) so OSSF Scorecard
            # recognizes the artifact as signed. The bytes are identical to
            # cosign's --bundle output; only the extension differs.
            cosign sign-blob --yes "$file" --bundle "${file}.sigstore.json"
          done

      - name: Generate build-provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.zip
            dist/${{ inputs.archive-prefix }}-${{ steps.version.outputs.version }}.tar.gz

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  publish-to-ter:
    name: Publish to TER
    needs: build-and-sign
    if: ${{ !inputs.skip-ter }}
    # Declare permissions at the calling-job level so GitHub's startup-time
    # validator sees that we can cover publish-to-ter.yml's inner
    # `contents: read`. The workflow-level `permissions: {}` is empty and
    # is inherited by `uses:` jobs just like by regular jobs — but an
    # inherited empty set cannot satisfy the called workflow's required
    # `contents: read`, so without this per-job grant the workflow fails
    # with `startup_failure` and zero materialised jobs.
    permissions:
      contents: read
    uses: netresearch/typo3-ci-workflows/.github/workflows/publish-to-ter.yml@main
    with:
      ref: ${{ github.ref }}
    # Explicit secret pass-through (NOT `secrets: inherit`) so a
    # compromised action in the called workflow can't reach unrelated
    # org secrets. Forwards only the TER token actually needed.
    secrets:
      TYPO3_TER_ACCESS_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}

  verify-packagist:
    name: Verify Packagist
    needs: build-and-sign
    if: ${{ !inputs.skip-packagist }}
    # Packagist's GitHub integration auto-subscribes to push/tag events and
    # rescans without our workflow having to do anything. This job only
    # polls the Packagist API until the new version is visible.
    permissions:
      contents: read
    uses: netresearch/typo3-ci-workflows/.github/workflows/publish-to-packagist.yml@main
    with:
      package-name: ${{ inputs.package-name }}
      version: ${{ needs.build-and-sign.outputs.version }}

  verify-docs:
    name: Verify docs.typo3.org
    needs: build-and-sign
    # docs.typo3.org renders via the Intercept webhook subscribed to GitHub
    # push events — independent of TER. Runs in parallel with the TER and
    # Packagist jobs, no `needs:` coupling.
    if: ${{ !inputs.skip-docs }}
    permissions:
      contents: read
    uses: netresearch/typo3-ci-workflows/.github/workflows/publish-to-docs.yml@main
    with:
      package-name: ${{ inputs.package-name }}

  create-release:
    name: Create GitHub Release
    needs: [build-and-sign, publish-to-ter, verify-packagist, verify-docs]
    # Run only if every non-skipped publish reached success. This enforces
    # "release-last": the GitHub release is a receipt of a successful run, and
    # never a canvas that gets edited afterwards. If any publish failed, no
    # release is created and the orchestrator must be re-run to finish.
    if: >-
      ${{
        always()
        && needs.build-and-sign.result == 'success'
        && (needs.publish-to-ter.result == 'success' || needs.publish-to-ter.result == 'skipped')
        && (needs.verify-packagist.result == 'success' || needs.verify-packagist.result == 'skipped')
        && (needs.verify-docs.result == 'success' || needs.verify-docs.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist/

      - name: Compose verification-evidence block
        id: evidence
        env:
          PACKAGE: ${{ inputs.package-name }}
          KEY: ${{ inputs.extension-key }}
          VERSION: ${{ needs.build-and-sign.outputs.version }}
          TER_RESULT: ${{ needs.publish-to-ter.result }}
          PKGST_RESULT: ${{ needs.verify-packagist.result }}
          DOCS_RESULT: ${{ needs.verify-docs.result }}
        run: |
          DELIMITER="ghadelim_$(openssl rand -hex 8)"
          # Intercept maps the tag to a major.minor docs branch (v0.8.1 → 0.8),
          # so the published URL uses major.minor, not the full semver.
          DOCS_BRANCH=$(echo "$VERSION" | awk -F. '{printf "%s.%s", $1, $2}')
          {
            echo "block<<$DELIMITER"
            echo "## Publication status"
            echo ""
            if [[ "$TER_RESULT" == "success" ]]; then
              echo "- TER: [extensions.typo3.org/extension/${KEY}](https://extensions.typo3.org/extension/${KEY}) — ${VERSION} verified"
            elif [[ "$TER_RESULT" == "skipped" ]]; then
              echo "- TER: skipped"
            fi
            if [[ "$PKGST_RESULT" == "success" ]]; then
              echo "- Packagist: [packagist.org/packages/${PACKAGE}](https://packagist.org/packages/${PACKAGE}) — ${VERSION} verified"
            elif [[ "$PKGST_RESULT" == "skipped" ]]; then
              echo "- Packagist: skipped"
            fi
            if [[ "$DOCS_RESULT" == "success" ]]; then
              # docs.typo3.org path uses the composer package name verbatim
              # (`{vendor}/{repo-name}` with dashes), NOT the TYPO3 extension
              # key (which uses underscores).
              echo "- Documentation: [docs.typo3.org/p/${PACKAGE}/${DOCS_BRANCH}/en-us/](https://docs.typo3.org/p/${PACKAGE}/${DOCS_BRANCH}/en-us/) — render verified"
            elif [[ "$DOCS_RESULT" == "skipped" ]]; then
              echo "- Documentation: skipped"
            fi
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (atomic, all assets)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*
          fail_on_unmatched_files: true
          body: |
            ## Changes
            ${{ needs.build-and-sign.outputs.release-notes }}

            ## Installation

            ```bash
            composer require ${{ inputs.package-name }}
            ```

            ${{ steps.evidence.outputs.block }}

            ## Security

            All release artifacts are signed with [Sigstore](https://www.sigstore.dev/) keyless signing.

            ### Verify signatures

            ```bash
            cosign verify-blob \
              --bundle ${{ inputs.archive-prefix }}-${{ needs.build-and-sign.outputs.version }}.zip.sigstore.json \
              --certificate-identity-regexp "https://github.com/${{ github.repository_owner }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ inputs.archive-prefix }}-${{ needs.build-and-sign.outputs.version }}.zip
            ```

            ### Verify checksums

            ```bash
            sha256sum -c checksums.txt
            ```

            ## Software Bill of Materials (SBOM)

            SBOMs are provided in both SPDX and CycloneDX formats for supply chain transparency.
